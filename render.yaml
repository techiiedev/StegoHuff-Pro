services:
  # This tells Render to create a Web Service
  - type: web
    name: stegohuff-pro
    env: python
    # This points to the build script we made in the previous step
    buildCommand: "./build.sh"
    # This tells Render how to run your Django app using Gunicorn
    startCommand: "gunicorn stego_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: stego_project.settings
      # This is a dummy secret key for production; change this for real apps
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4